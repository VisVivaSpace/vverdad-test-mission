# .github/workflows/vverdad.yml
name: VVERDAD Render

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install vv
        run: |
          curl -sL https://github.com/VisVivaSpace/vverdad-prototype/releases/latest/download/vv-x86_64-unknown-linux-gnu.tar.gz | tar xz
          sudo mv vv /usr/local/bin/

      - name: Pre-pull Docker images
        run: |
          docker pull ubuntu:latest
          docker pull python:3.11-slim
          docker pull ghcr.io/quarto-dev/quarto:latest

      - name: Debug subsystem_summary container
        run: |
          vv . -d debug-artifacts/ -y || true
          ls -la debug-artifacts/_output/reports/subsystem_summary.analysis/ || true
          cat debug-artifacts/_output/reports/subsystem_summary.analysis/subsystem_summary.qmd || true
          docker run --rm -v $(pwd)/debug-artifacts/_output/reports/subsystem_summary.analysis:/analysis -w /analysis ghcr.io/quarto-dev/quarto:latest sh run.sh 2>&1 || true

      - name: Render project
        run: vv . -d artifacts/ -y

      - name: Upload outputs
        uses: actions/upload-artifact@v4
        with:
          name: vverdad-output
          path: artifacts/_output/

      - name: Commit outputs
        if: github.event_name == 'push'
        run: |
          git config user.name "VVERDAD CI"
          git config user.email "vverdad@ci"
          cp -r artifacts/_output/ _output/
          git add -f _output/
          git diff --cached --quiet || git commit -m "Update rendered outputs"
          git push
